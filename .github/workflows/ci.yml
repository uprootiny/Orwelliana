name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest

      - name: Run tests
        run: bb -m test-runner

      - name: Generate sample trace
        run: bb -m orwelliana.core simulate path=traces/sample.jsonl

      - name: Render dashboard smoke test
        run: bb -m orwelliana.core dashboard path=traces/sample.jsonl
